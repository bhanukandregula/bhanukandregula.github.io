site_name: Bhanu Kandregula
site_url: https://www.bhanukandregula.github.io

theme:
  name: material

  font:
    text: Roboto
    code: Red Hat Mono

  features:
    - navigation.footer
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

  palette:
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: green
      accent: deep purple

    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue
      accent: deep orange

nav:
  - Home: index.md

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: Copyright &copy; 2026 Bhanu Prakash Kandregula